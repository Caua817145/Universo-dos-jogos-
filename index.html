<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo dos Jogos | Milhares de Jogos Grátis</title>
    <link rel="stylesheet" href="style.css">
    
    <script async 
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5775678596507244" 
      crossorigin="anonymous"></script>
    
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
      const adBreak = adConfig = function(o) {adsbygoogle.push(o);}
    </script>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Universo <span>dos Jogos</span></h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Buscar jogo no Universo...">
        </div>
    </header>

    <main>
        <div id="game-grid" class="game-grid">
            <div class="loader">Carregando o Universo de diversão...</div>
        </div>
    </main>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div id="game-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
